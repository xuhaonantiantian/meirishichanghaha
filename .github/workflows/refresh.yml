name: Refresh Market Dashboard

on:
  schedule:
    # Runs at minute 0,15,30,45 during UTC hours 1-6 (Beijing 9:00-14:45) Mon-Fri
    - cron: '*/15 1-6 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh market data
        run: python scripts/refresh.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-refresh market data"
          commit_user_name: "Market Bot"
          commit_user_email: "bot@market-dashboard.local"

      - name: Trigger Pages rebuild
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
