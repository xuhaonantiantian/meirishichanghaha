name: Refresh Market Dashboard

on:
  schedule:
    # Every 10 min during UTC 1-6 (Beijing 9:00-14:50) Mon-Fri
    # Script auto-skips outside 9:30-15:00 China time
    - cron: '*/10 1-6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Refresh market data
        run: python scripts/refresh.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-refresh market data"
